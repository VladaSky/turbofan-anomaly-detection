name: CI / CD — Test & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: smoke-test the lite API ──────────────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deployment dependencies
        run: pip install -r requirements-deploy.txt httpx

      - name: Start API and verify /health
        run: |
          uvicorn src.api_lite:app --host 0.0.0.0 --port 8000 &
          sleep 5
          curl -sf http://localhost:8000/health | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['status'] == 'ok', f'Health check failed: {d}'
          print('Health check passed:', d)
          "

  # ── Job 2: trigger Render redeploy (main branch only) ───────────────────────
  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Trigger Render redeploy
        run: |
          curl -sf -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Render deploy triggered successfully."
